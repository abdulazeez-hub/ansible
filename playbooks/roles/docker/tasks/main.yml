---
- name: Update apt cache
  apt:
    update_cache: yes

- name: Install Docker
  apt:
    name: docker.io
    state: present

- name: Start Docker service
  service:
    name: docker
    state: started
    enabled: true

- name: Verify Docker installation
  command: docker --version
  register: docker_version
  changed_when: false
  no_log: false

- name: Display Docker version
  debug:
    var: docker_version.stdout
  no_log: false